name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Build distributions
        run: python -m build

      - name: Smoke test installed launcher
        run: |
          python -m venv /tmp/stc-smoke
          /tmp/stc-smoke/bin/python -m pip install --upgrade pip
          /tmp/stc-smoke/bin/pip install dist/*.whl
          cd /tmp
          /tmp/stc-smoke/bin/python -m st_components.examples --list
